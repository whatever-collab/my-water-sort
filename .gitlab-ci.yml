image: ubuntu:22.04

stages:
  - build

build_apk:
  stage: build
  before_script:
    # Ignore pipefail for sdkmanager license issues
    - set +o pipefail
    
    # 1. Install basic dependencies
    - apt-get update 
    - apt-get install -y curl git unzip xz-utils zip libglu1-mesa openjdk-17-jdk-headless
    
    # 2. Set up Java (required for Flutter/Android)
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    
    # 3. Download and set up Flutter
    - git clone https://github.com/flutter/flutter.git -b stable --depth 1 /usr/local/flutter
    - cd /usr/local/flutter
    - export PATH="/usr/local/flutter/bin:/usr/local/flutter/bin/cache/dart-sdk/bin:$PATH"
    
    # 4. Precache Flutter artifacts for Android
    - flutter precache --android
    
    # 5. Set up Android SDK Home
    - export ANDROID_HOME=$HOME/android-sdk
    - mkdir -p $ANDROID_HOME/cmdline-tools/latest/bin
    
    # 6. Download Android Command Line Tools
    - curl -o cmdlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    - unzip -q cmdlinetools.zip -d $ANDROID_HOME/cmdline-tools/temp
    - mv $ANDROID_HOME/cmdline-tools/temp/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
    - rm -rf $ANDROID_HOME/cmdline-tools/temp cmdlinetools.zip
    
    # 7. Add sdkmanager to PATH
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
    
    # 8. Accept Licenses (ignore exit code 141) and Install Required SDK Packages
    - yes | sdkmanager --licenses || true
    - sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
  
  script:
    - cd $CI_PROJECT_DIR
    
    # Generate a debug keystore if it doesn't exist (for CI builds)
    - if [ ! -f android/debug.keystore ]; then
        keytool -genkeypair -alias androiddebugkey -keyalg RSA -keypass android -keystore android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999;
      fi
      
    - flutter pub get
    - flutter build apk --release
  artifacts:
    paths:
      - build/app/outputs/apk/release/app-release.apk
    expire_in: 1 week
