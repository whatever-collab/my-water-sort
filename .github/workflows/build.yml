name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Increased timeout significantly

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Clean previous builds
        run: flutter clean

      - name: Build APK
        env:
          # Disable Gradle daemon and parallel execution to prevent hangs
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Xmx4g'
        run: |
          echo "Starting build..."
          flutter build apk --release --verbose > build_log.txt 2>&1 || exit 1
          echo "Build completed."
          
      - name: Check Build Log for Errors
        run: |
          if grep -q "FAILURE:" build_log.txt; then
            echo "Found FAILURE in build log:"
            grep -A 20 "FAILURE:" build_log.txt
            exit 1
          fi
          if grep -q "BUILD FAILED" build_log.txt; then
            echo "Found BUILD FAILED in build log:"
            tail -50 build_log.txt
            exit 1
          fi
          echo "No obvious failures found in log."

      - name: List Output Directory
        run: ls -la build/app/outputs/flutter-apk/ || echo "Directory not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
