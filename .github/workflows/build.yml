name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        env:
          # Reduced heap size to 2GB to prevent OOM on CI runners
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Xmx2g -XX:+UseSerialGC'
        run: |
          echo "Starting build..."
          flutter build apk --release --verbose
          echo "Build command finished."

      - name: Check for Killed Process
        run: |
          dmesg | grep -i "killed process" || echo "No OOM kills detected in dmesg"

      - name: List Output Directory
        run: ls -la build/app/outputs/flutter-apk/ || echo "Directory not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
